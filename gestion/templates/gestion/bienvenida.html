{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenaFOOD - Bienvenido</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'gestion/css/styles.css' %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── SLIDER ─────────────────────────────────────── */
        .hero-slider {
            position: relative;
            flex: 1.2;
            min-height: 340px;
            overflow: hidden;
            margin-top: 70px;
            background: linear-gradient(135deg, #2d2d2d 0%, #4a4a4a 50%, #2d2d2d 100%);
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.9s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                rgba(0,0,0,0.10) 0%,
                rgba(0,0,0,0.50) 100%);
        }

        /* Texto sobre el slider */
        .slide-caption {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            text-align: center;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            white-space: nowrap;
        }

        .slide-caption span {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: rgba(40,167,69,0.75);
            padding: 4px 18px;
            border-radius: 20px;
        }

        /* Puntos indicadores */
        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }

        .dot.active {
            background: white;
            transform: scale(1.3);
        }

        /* Flechas de navegación */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 4;
            background: rgba(0,0,0,0.35);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .slider-arrow:hover { background: rgba(40,167,69,0.8); }
        .slider-arrow.prev { left: 14px; }
        .slider-arrow.next { right: 14px; }

        /* ── PARTE INFERIOR ─────────────────────────────── */
        .bottom {
            flex: 1;
            background: linear-gradient(135deg, #a8d5b5 0%, #d4edda 50%, #f0fff4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.8rem 2rem;
            text-align: center;
            gap: 0.4rem;
        }

        .bottom img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin-bottom: -0.5rem;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: #28a745;
            border-radius: 2px;
            margin: 0.6rem auto;
        }

        .bottom h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 0.3rem;
        }

        .bottom h1 span { color: #28a745; }

        .bottom p {
            font-size: 0.95rem;
            color: #555;
            max-width: 400px;
            margin-bottom: 1rem;
        }

        .btn-group { display: flex; gap: 1rem; }

        .btn-ingresar {
            background: #28a745;
            color: white;
            border: none;
            padding: 11px 38px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-ingresar:hover {
            background: #218838;
            color: white;
            transform: translateY(-1px);
        }

        .btn-registrar {
            background: white;
            color: #28a745;
            border: 2px solid #28a745;
            padding: 11px 38px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-registrar:hover {
            background: #28a745;
            color: white;
            transform: translateY(-1px);
        }

        /* ── RESPONSIVE ─────────────────────────────────── */
        @media (max-width: 768px) {
            .hero-slider { min-height: 220px; }
            .slide-caption span { font-size: 0.85rem; }
            .bottom img { width: 100px; height: 100px; }
            .bottom h1 { font-size: 1.4rem; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn-ingresar, .btn-registrar {
                width: 100%;
                justify-content: center;
                padding: 12px 24px;
            }
        }

        @media (max-width: 480px) {
            .hero-slider { min-height: 170px; }
            .slider-arrow { display: none; }
        }
    </style>
</head>

<body>
    {% include 'gestion/navbar_publico.html' %}

    <!-- ── SLIDER DE IMÁGENES ── -->
    <div class="hero-slider" id="heroSlider">

        <div class="slide active"
             style="background-image:url('{% static 'gestion/img/almuerzo.png' %}')">
            <div class="slide-caption"><span>🍱 Almuerzos del día</span></div>
        </div>

        <div class="slide"
             style="background-image:url('{% static 'gestion/img/cafepan.png' %}')">
            <div class="slide-caption"><span>☕ Café y pan</span></div>
        </div>

        <div class="slide"
             style="background-image:url('{% static 'gestion/img/chips.png' %}')">
            <div class="slide-caption"><span>🍟 Snacks y chips</span></div>
        </div>

        <div class="slide"
             style="background-image:url('{% static 'gestion/img/empanada.png' %}')">
            <div class="slide-caption"><span>🥟 Empanadas</span></div>
        </div>

        <div class="slide"
             style="background-image:url('{% static 'gestion/img/gaseosas.png' %}')">
            <div class="slide-caption"><span>🥤 Bebidas y gaseosas</span></div>
        </div>

        <!-- Flechas -->
        <button class="slider-arrow prev" onclick="cambiarSlide(-1)">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="slider-arrow next" onclick="cambiarSlide(1)">
            <i class="fas fa-chevron-right"></i>
        </button>

        <!-- Puntos indicadores -->
        <div class="slider-dots">
            <div class="dot active" onclick="irASlide(0)"></div>
            <div class="dot" onclick="irASlide(1)"></div>
            <div class="dot" onclick="irASlide(2)"></div>
            <div class="dot" onclick="irASlide(3)"></div>
            <div class="dot" onclick="irASlide(4)"></div>
        </div>
    </div>

    <!-- ── CONTENIDO INFERIOR ── -->
    <div class="bottom">
        <img src="{% static 'gestion/img/logo.png' %}" alt="SenaFOOD">
        <div class="divider"></div>
        <h1><span>¡Bienvenido a SenaFOOD!</span></h1>
        <p>Explora la variedad y el sabor optimizando tu tiempo.</p>
        <div class="btn-group">
            <a href="{% url 'login' %}" class="btn-ingresar">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </a>
            <a href="{% url 'registro' %}" class="btn-registrar">
                <i class="fas fa-user-plus"></i> Registrar
            </a>
        </div>
    </div>

    <script>
        let slideActual = 0;
        const slides = document.querySelectorAll('.slide');
        const dots   = document.querySelectorAll('.dot');
        let intervalo;

        function mostrarSlide(n) {
            slides[slideActual].classList.remove('active');
            dots[slideActual].classList.remove('active');
            slideActual = (n + slides.length) % slides.length;
            slides[slideActual].classList.add('active');
            dots[slideActual].classList.add('active');
        }

        function cambiarSlide(dir) {
            mostrarSlide(slideActual + dir);
            reiniciarIntervalo();
        }

        function irASlide(n) {
            mostrarSlide(n);
            reiniciarIntervalo();
        }

        function reiniciarIntervalo() {
            clearInterval(intervalo);
            intervalo = setInterval(() => mostrarSlide(slideActual + 1), 4000);
        }

        // Arrancar automático cada 4 segundos
        intervalo = setInterval(() => mostrarSlide(slideActual + 1), 4000);

        // Swipe en móvil
        let touchStartX = 0;
        document.getElementById('heroSlider').addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
        });
        document.getElementById('heroSlider').addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 40) cambiarSlide(diff > 0 ? 1 : -1);
        });
    </script>
</body>
</html>
